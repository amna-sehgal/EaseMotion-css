<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elastic Gauge</title>

<link rel="stylesheet" href="../../../easemotion.css">
<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    background:#020617;
    font-family:system-ui,sans-serif;
}
</style>

</head>

<body>

<section
class="ease-center"
style="min-height:100vh;padding:4rem 1.5rem;"
>

<div style="width:100%;max-width:1100px;">

<h1
class="ease-fade-in"
style="text-align:center;color:white;"
>
Elastic Gauge
</h1>

<p
class="ease-slide-up ease-delay-100"
style="
max-width:700px;
margin:1rem auto 3rem;
text-align:center;
color:#cbd5e1;
"
>
A neon-inspired elastic gauge component built with pure CSS. Ideal for
analytics dashboards, monitoring systems, and admin interfaces.
</p>

<div class="ease-gauge-wrapper">

<!-- Gauge 1 -->

<div class="ease-gauge"
style="
--gauge-value:72%;
--gauge-color:#22d3ee;
">

<div class="ease-gauge-ring"></div>

<div class="ease-gauge-content">

<div class="ease-gauge-value">
72%
</div>

<div class="ease-gauge-label">
CPU Usage
</div>

</div>

</div>

<!-- Gauge 2 -->

<div class="ease-gauge"
style="
--gauge-value:58%;
--gauge-color:#a855f7;
">

<div class="ease-gauge-ring"></div>

<div class="ease-gauge-content">

<div class="ease-gauge-value">
58%
</div>

<div class="ease-gauge-label">
Memory
</div>

</div>

</div>

<!-- Gauge 3 -->

<div class="ease-gauge"
style="
--gauge-value:91%;
--gauge-color:#10b981;
">

<div class="ease-gauge-ring"></div>

<div class="ease-gauge-content">

<div class="ease-gauge-value">
91%
</div>

<div class="ease-gauge-label">
Storage
</div>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
